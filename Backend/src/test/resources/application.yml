spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5430}/${DB_NAME:financetoy}?currentSchema=${TEST_DB_SCHEMA:financetoy_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        default_schema: ${TEST_DB_SCHEMA:financetoy_test}
  jackson:
    serialization:
      write-dates-as-timestamps: false
