services:
  postgres:
    image: postgres:16-alpine
    container_name: financetoy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financetoy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5430:5432"
    volumes:
      - financetoy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financetoy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  financetoy-postgres-data:
